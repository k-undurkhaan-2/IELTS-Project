<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>IELTS Atlas Password</title>
        <link rel="stylesheet" href="/auth/password.css" />
        <link rel="stylesheet" href="/src/styles/tokens.css" />
        <link rel="stylesheet" href="/src/styles/layout.css" />
        <link rel="stylesheet" href="/src/styles/components.css" />
    </head>
    <body class="ds-auth">
        <main class="password-shell">
            <section class="password-panel" aria-labelledby="password-title">
                <div class="password-heading">
                    <p>IELTS Atlas</p>
                    <h1 id="password-title">Change password</h1>
                </div>

                <div id="password-status" class="password-status" role="status" aria-live="polite">Checking session...</div>

                <form id="password-form" class="password-form" hidden>
                    <label>
                        <span>Current password</span>
                        <input id="current-password" name="currentPassword" type="password" autocomplete="current-password" required />
                    </label>
                    <label id="password-totp-row" hidden>
                        <span>Current TOTP or recovery code</span>
                        <input id="password-totp-token" name="totpToken" inputmode="numeric" autocomplete="one-time-code" maxlength="64" />
                    </label>
                    <label>
                        <span>New password</span>
                        <input id="new-password" name="newPassword" type="password" autocomplete="new-password" minlength="8" required />
                    </label>
                    <button id="password-submit" type="submit">Update password</button>
                </form>

                <a id="password-back-link" class="password-secondary-link" href="/">Back to app</a>
            </section>
        </main>
        <script src="/auth/password.js"></script>
    </body>
</html>
